<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sios Coffee</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
            url("first.PNG");
            background-size:cover;
            background-position:center;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-box{
            width:380px;
            background:white;
            padding:40px;
            border-radius:10px;
            box-shadow:0 0 20px rgba(0,0,0,.3);
            text-align:center;
        }

        .login-box img{
            width:100px;
            margin-bottom:15px;
        }

        h2{
            margin-bottom:20px;
            color:#5c3d2e;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
        }

        button{
            width:100%;
            padding:12px;
            background:#6F4E37;
            color:white;
            border:none;
            border-radius:5px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#4b3225;
        }

        p{
            margin-top:15px;
            font-size:14px;
        }

        a{
            color:#6F4E37;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="login-box">

    <img src="img/sios coffee logo.png" alt="Logo">

    <h2>Login Sios Coffee</h2>

    <form onsubmit="return login()">

        <input
            type="text"
            id="username"
            placeholder="Username"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">Masuk</button>

    </form>

    <p>Belum punya akun? <a href="#">Daftar</a></p>

</div>

<script>
const users = [
    { username: "heri", password: "123" },
    { username: "liana", password: "123" }
];

function login() {

    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;

    let valid = users.some(function(u) {
        return u.username === user && u.password === pass;
    });

    if (valid) {
        alert("Login Berhasil");
        window.location.href = "home.html";
    } else {
        alert("Username atau Password salah!");
    }

    return false;
}
</script>

</body>
</html>
