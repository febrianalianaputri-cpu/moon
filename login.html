<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#2c3e50,#4ca1af);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:10px;
width:320px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

#error{
color:red;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="login-box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="error"></p>
</div>

<script>
function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(
(u=="heri" && p=="123") ||
(u=="liana" && p=="1234")
){
window.location.href="index.html";
}else{
document.getElementById("error").innerHTML="Username atau Password salah!";
}

}
</script>

</body>
</html>
